name: Release binaries

on:
  push:
    tags:
      - 'sluice-cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump in the Homebrew tap (e.g., 0.1.1). Archives must already exist on the matching release.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'push'
    name: Build ${{ matrix.os_arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os_arch: linux-amd64
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os_arch: linux-arm64
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os_arch: darwin-amd64
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os_arch: darwin-arm64
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os_arch: windows-amd64
            os: windows-latest
            archive: zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Match rust-toolchain.toml (1.85.0). Using @stable would add the
        # cross-target to stable, but rust-toolchain.toml makes cargo use
        # 1.85.0, which then lacks the target -> E0463 "can't find crate
        # for `core`" on aarch64-unknown-linux-gnu.
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install aarch64 cross-compiler
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release -p sluice-cli --target ${{ matrix.target }}

      - name: Determine version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#sluice-cli-v}" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE="sluice-${{ steps.version.outputs.VERSION }}-${{ matrix.os_arch }}.tar.gz"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" sluice
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "sluice-${{ steps.version.outputs.VERSION }}-${{ matrix.os_arch }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/sluice.exe" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "${{ env.ARCHIVE }}" --clobber

  bump-homebrew:
    name: Bump Homebrew formula
    needs: [build]
    # Runs on tag push after `build` succeeds, or on a manual workflow_dispatch
    # (used to backfill the tap for an already-uploaded release without cutting
    # a new version).
    if: always() && (github.event_name == 'workflow_dispatch' || needs.build.result == 'success')
    runs-on: ubuntu-latest
    env:
      REPO_SLUG: ${{ github.repository }}
      TAP_OWNER: overengineered-dev
      TAP_REPO: homebrew-tap
    steps:
      - name: Resolve version and tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="sluice-cli-v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#sluice-cli-v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download archives and compute SHA256
        id: checksums
        shell: bash
        env:
          VERSION: ${{ steps.resolve.outputs.VERSION }}
          TAG: ${{ steps.resolve.outputs.TAG }}
        run: |
          set -euo pipefail
          base="https://github.com/${REPO_SLUG}/releases/download/${TAG}"
          for target in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            name="sluice-${VERSION}-${target}.tar.gz"
            url="${base}/${name}"
            echo "Fetching ${url}"
            sha=$(curl -fsSL "$url" | sha256sum | awk '{print $1}')
            key=$(echo "$target" | tr 'a-z-' 'A-Z_')
            echo "URL_${key}=${url}" >> "$GITHUB_OUTPUT"
            echo "SHA_${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Render Formula/sluice.rb
        shell: bash
        env:
          VERSION: ${{ steps.resolve.outputs.VERSION }}
          URL_DARWIN_AMD64: ${{ steps.checksums.outputs.URL_DARWIN_AMD64 }}
          URL_DARWIN_ARM64: ${{ steps.checksums.outputs.URL_DARWIN_ARM64 }}
          URL_LINUX_AMD64:  ${{ steps.checksums.outputs.URL_LINUX_AMD64 }}
          URL_LINUX_ARM64:  ${{ steps.checksums.outputs.URL_LINUX_ARM64 }}
          SHA_DARWIN_AMD64: ${{ steps.checksums.outputs.SHA_DARWIN_AMD64 }}
          SHA_DARWIN_ARM64: ${{ steps.checksums.outputs.SHA_DARWIN_ARM64 }}
          SHA_LINUX_AMD64:  ${{ steps.checksums.outputs.SHA_LINUX_AMD64 }}
          SHA_LINUX_ARM64:  ${{ steps.checksums.outputs.SHA_LINUX_ARM64 }}
        run: |
          set -euo pipefail
          cat > sluice.rb <<RUBY
          class Sluice < Formula
            desc "CLI that parses Maven Central index chunks into JSON Lines"
            homepage "https://github.com/${REPO_SLUG}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "${URL_DARWIN_ARM64}"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "${URL_DARWIN_AMD64}"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_intel do
                url "${URL_LINUX_AMD64}"
                sha256 "${SHA_LINUX_AMD64}"
              end
              on_arm do
                url "${URL_LINUX_ARM64}"
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            def install
              bin.install "sluice"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sluice --version")
            end
          end
          RUBY

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_OWNER }}/${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push formula
        shell: bash
        env:
          VERSION: ${{ steps.resolve.outputs.VERSION }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          mv sluice.rb tap/Formula/sluice.rb
          cd tap
          git config user.name "sluice-release-bot"
          git config user.email "noreply@overengineered.dev"
          git add Formula/sluice.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "sluice ${VERSION}"
          git push
